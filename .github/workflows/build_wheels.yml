name: Build Wheels
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
# LINUX
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: webfactory/ssh-agent@v0.9.0
      with: 
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with: { platforms: all }

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.23
      with: { output-dir: wheelhouse }

    - name: Validate wheels
      shell: bash
      run: |
        python -m pip install --upgrade -q pip twine
        twine check wheelhouse/*.whl
        for w in wheelhouse/*.whl; do zip -T "$w" >/dev/null; done

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-linux
        path: wheelhouse/*.whl

# macOS
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: webfactory/ssh-agent@v0.9.0
      with: 
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache cibuildwheel downloads
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/cibuildwheel
        key: cibw-macos-${{ runner.os }}-${{ hashFiles('pyproject.toml', '.github/workflows/build_wheels.yml') }}
        restore-keys: |
          cibw-macos-${{ runner.os }}-

    - name: Prefetch virtualenv bootstrap
      shell: bash
      run: |
        mkdir -p ~/Library/Caches/cibuildwheel
        curl -fL --retry 6 --retry-delay 10 --retry-all-errors \
          -o ~/Library/Caches/cibuildwheel/virtualenv-20.30.0.pyz \
          https://raw.githubusercontent.com/pypa/get-virtualenv/20.30.0/public/virtualenv.pyz

    - name: Clean stale build directories
      shell: bash
      run: |
        rm -rf solvers-*/src/cadical_external/build
        rm -rf build/
        rm -rf *.egg-info

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.23
      env:
        CIBW_ARCHS_MACOS: "x86_64 arm64"
        MACOSX_DEPLOYMENT_TARGET: "11.0"
        CIBW_BEFORE_ALL_MACOS: |
          brew install libarchive pybind11 make python
          ln -sf "$(brew --prefix make)/libexec/gnubin/make" /usr/local/bin/make
      with: { output-dir: wheelhouse }

    - name: Validate wheels
      shell: bash
      run: |
        python -m pip install --upgrade -q twine
        twine check wheelhouse/*.whl
        for w in wheelhouse/*.whl; do zip -T "$w" >/dev/null; done

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: wheelhouse/*.whl

# SOURCE DISTRIBUTION
  build-sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y libarchive-dev

    - name: Build sdist
      run: |
        python -m pip install --upgrade -q build twine
        python -m build --sdist
        twine check dist/*.tar.gz

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

# PUBLISH to PYPI (Trusted Publishing / OIDC)
  release:
    needs: [build-linux, build-macos, build-sdist]
    runs-on: ubuntu-latest
    # Configure a PyPI Trusted Publisher for project "gbdc" pointing at this
    # repository, workflow "build_wheels.yml", and environment "pypi".
    environment:
      name: pypi
      url: https://pypi.org/p/gbdc
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
